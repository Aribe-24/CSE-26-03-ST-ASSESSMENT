{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videx - Welcome</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* Center content perfectly vertically and horizontally */
        html, body {
            height: 100%;
        }
        body {
            background-color: #ffffff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .landing-container {
            text-align: center;
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }

        /* Signature interactive landing button styling */
        .btn-join {
            color: #ff0000;
            background-color: #ffffff;
            border: 2px solid #ff0000;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 10px 60px;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
            display: inline-block;
            text-decoration: none;
        }
        
        .btn-join:hover {
            color: #ffffff !important;
            background-color: #ff0000 !important;
            border-color: #ff0000 !important;
        }
    </style>
</head>
<body>

<div class="landing-container">
    <div class="mb-4">
        <img src="{% static 'logo.png' %}" alt="Videx Logo" class="img-fluid" style="max-height: 120px;">
    </div>
    
    <div class="mt-2">
        <a href="{% url 'video_list' %}" class="btn btn-join">Join</a>
    </div>
</div>

</body>
</html>
