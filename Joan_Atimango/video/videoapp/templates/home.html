<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
</head>
<style>
   /* General page setup */
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Center content */
.container {
    text-align: center;
}

/* Logo section */
.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff0000;
    font-size: 60px;
    font-weight: 700;
    margin-bottom: 30px;
}

/* Play icon */
.play-icon {
    font-size: 70px;
    margin-right: 15px;
}

/* Join button */
.join-btn {
    background-color: transparent;
    border: 2px solid #ff0000;
    color: #ff0000;
    font-size: 18px;
    font-weight: 600;
    padding: 12px 40px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.join-btn:hover {
    background-color: #ff0000;
    color: #ffffff;
}

</style>
<body>
    <div class="container">
        <div class="logo">
        <div class="play-icon">&#9658;</div>
        <h1>Videx</h1>
        </div>
        <a href="{% url 'video_display' %}">
            <button class="join-btn">Join Now</button>
        </a>
        </div>
    </div>
</body>
</html>
