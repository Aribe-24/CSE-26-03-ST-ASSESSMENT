<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Videx</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --red: #ff0000; --red-dark: #cc0000; --ink: #1e2430; --muted: #7d8490;
      --line: #e6e9ef; --field: #f7f8fb; --soft: #f1f4f8; --success: #16804a; --danger: #d82f3a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; 
        min-height: 100vh; 
        color: var(--ink); 
        background: #fafafa; 
        font-family: "Trebuchet MS", Arial, sans-serif; }

    a { color: inherit; text-decoration: none; }
    .landing-page { min-height: 100vh; 
        display: grid; 
        place-items: center; 
        background: #fff; }

    .join-panel { display: grid; 
        justify-items: center; 
        gap: 35px; }

    .brand { display: inline-flex; 
        align-items: center; 
        gap: 14px; 
        color: var(--red); 
        font-size: 44px; 
        font-weight: bold; }

    .brand-large { font-size: 82px; }

    .brand-icon { width: 42px; 
        height: 42px; 
        display: inline-grid; 
        place-items: center; 
        border-radius: 50%; 
        color: #fff; 
        background: var(--red); 
        font-size: 18px; 
        line-height: 1; }

    .brand-large .brand-icon { width: 64px; 
        height: 64px; font-size: 28px; }
    .outline-button { min-height: 48px; 
        border: 2px solid var(--red); 
        border-radius: 4px; 
        padding: 0 60px; 
        display: inline-grid; 
        place-items: center; color: var(--red); 
        background: transparent; 
        font-size: 14px; 
        font-weight: 800; 
        cursor: pointer; 
        transition: background .18s ease, color .18s ease; 
        text-decoration: none; }
    .outline-button:hover { background: var(--red); 
        color: #fff; }
    .outline-button:active { background: #fff; 
        color: var(--red); }
        
  </style>
</head>
<body>
<div class="landing-page">
  <div class="join-panel">
    <a href="{% url 'video_list' %}" class="brand brand-large">
      <span class="brand-icon"><i class="fa-solid fa-play"></i></span>
      Videx
    </a>
    <a href="{% url 'video_list' %}" class="outline-button">JOIN</a>
  </div>
</div>
</body>
</html>
