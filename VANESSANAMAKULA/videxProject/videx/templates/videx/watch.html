<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>{{ video.title }} - Videx</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --red: #ff0000; --red-dark: #cc0000; --ink: #1e2430; --muted: #7d8490;
      --line: #e6e9ef; --soft: #f1f4f8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: #fafafa; font-family: "Trebuchet MS", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    .brand { display: inline-flex; align-items: center; gap: 14px; color: var(--red); font-size: 44px; font-weight: bold; }
    .brand-icon { width: 42px; height: 42px; display: inline-grid; place-items: center; border-radius: 50%; color: #fff; background: var(--red); font-size: 18px; }
    .page-shell { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 48px 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 18px; }
    .back-link { display: inline-block; margin-bottom: 16px; color: var(--muted); font-weight: 700; }
    .player { width: 100%; border-radius: 4px; background: #000; }
    .meta { margin-top: 16px; }
    .meta h1 { font-size: 22px; margin: 0 0 6px; }
    .meta p { font-size: 13px; color: var(--muted); margin: 0 0 12px; }
    .description { font-size: 14px; color: #444; line-height: 1.6; background: #fff; padding: 16px; border: 1px solid var(--line); border-radius: 4px; margin-top: 12px; }
  </style>
</head>
<body>
<div class="page-shell">
  <div class="topbar">
    <a href="{% url 'landing' %}" class="brand">
      <span class="brand-icon"><i class="fa-solid fa-play"></i></span>
      Videx
    </a>
  </div>
  <a href="{% url 'video_list' %}" class="back-link">← Back to Videos</a>
  <video class="player" controls autoplay>
    <source src="{{ video.video_file.url }}" type="video/mp4"/>
    Your browser does not support the video tag.
  </video>
  <div class="meta">
    <h1>{{ video.title }}</h1>
    <p>{{ video.views }} views &nbsp;·&nbsp; {{ video.quality }} &nbsp;·&nbsp; Published {{ video.date_of_publishing }}</p>
    {% if video.description %}
    <div class="description">{{ video.description }}</div>
    {% endif %}
  </div>
</div>
</body>
</html>
