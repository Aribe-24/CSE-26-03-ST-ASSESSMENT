<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Videx</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Roboto',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8f9fa;
    }

    .container{
      width:100%;
      max-width:450px;
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo h1{
      color:#FF0000;
      font-size:42px;
    }

    .logo p{
      color:#666;
      margin-top:8px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:6px;
      font-weight:500;
      color:#333;
    }

    .form-control{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:15px;
    }

    .form-control:focus{
      outline:none;
      border-color:#FF0000;
    }

    .btn-register{
      width:100%;
      padding:14px;
      background:#FF0000;
      border:none;
      border-radius:6px;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }

    .btn-register:hover{
      background:#d90000;
    }

    .login-link{
      text-align:center;
      margin-top:20px;
      color:#666;
    }

    .login-link a{
      color:#FF0000;
      text-decoration:none;
      font-weight:bold;
    }

    .login-link a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <h1>Videx</h1>
      <p>Create your creator account</p>
    </div>

    <form action="/signup" method="POST">

      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          name="fullName"
          class="form-control"
          required>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input id="username"
          type="text"
          name="username"
          class="form-control"
          required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input id="email"
          type="email"
          name="email"
          class="form-control"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password"
          type="password"
          name="password"
          class="form-control"
          required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input id="confirmpassword"
          type="password"
          name="confirmPassword"
          class="form-control"
          required>
      </div>

      <button type="submit" class="btn-register">
        CREATE ACCOUNT
      </button>

    </form>

    <div class="login-link">
      Already have an account?
      <a href="/login">Login</a>
    </div>

  </div>

</body>
</html>
