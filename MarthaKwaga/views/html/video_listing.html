<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Videx – Videos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #fff; font-family: 'Roboto', Arial, sans-serif; }

    .play-icon {
      width: 36px; height: 36px;
      background: #FF0000;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .play-icon::after {
      content: '';
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 13px solid white;
      margin-left: 3px;
    }
    .logo-text { font-size: 24px; font-weight: 700; color: #FF0000; }

    .btn-add {
      border: 2px solid #FF0000;
      color: #FF0000;
      font-weight: 700;
      font-size: 14px;
      background: transparent;
      border-radius: 4px;
      padding: 8px 24px;
      transition: 0.2s;
    }
    .btn-add:hover { background: #FF0000; color: #fff; }

    .thumb {
      aspect-ratio: 16/9;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .thumb:hover .thumb-overlay { opacity: 1; }

    .card { border: none; cursor: pointer; }
    .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: #0f0f0f; }
    .card-meta { font-size: 12px; color: #606060; }
    .more-btn {
      background: none; border: none;
      color: #606060; font-size: 18px;
      padding: 2px 6px; border-radius: 50%;
      line-height: 1;
    }
    .more-btn:hover { background: #f2f2f2; }

    #noVideos {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar bg-white border-bottom sticky-top px-4 py-3">
    <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="#">
      <div class="play-icon"></div>
      <span class="logo-text">Videx</span>
    </a>
    <a href="/upload" class="btn-add">+ Add Video</a>
  </nav>

  <!-- MAIN -->
  <div class="container-fluid px-4 py-4">
    <h5 class="fw-bold mb-2">Videos</h5>
    <hr class="mb-4"/>

    <div id="videosContainer" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
      <!-- Videos will be loaded here by JavaScript -->
    </div>

    <div id="noVideos" class="d-none">
      <h4>No videos yet</h4>
      <p>Be the first to upload a video!</p>
      <a href="/upload" class="btn btn-danger">Upload Your First Video</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function loadVideos() {
      const container = document.getElementById('videosContainer');
      const noVideos = document.getElementById('noVideos');
      
      try {
        const response = await fetch('/api/videos');
        const data = await response.json();

        container.innerHTML = ''; // Clear previous content

        if (data.videos && data.videos.length > 0) {
          noVideos.classList.add('d-none');

          data.videos.forEach(video => {
            const cardHTML = `
              <div class="col">
                <div class="card h-100" onclick="watchVideo('${video.id}')">
                  <div class="thumb mb-2" 
                       style="background-image: url('${video.thumbnailUrl}')">
                    <div class="thumb-overlay">▶</div>
                  </div>
                  <div class="d-flex justify-content-between align-items-start px-2">
                    <div>
                      <div class="card-title">${video.title}</div>
                      <div class="card-meta">
                        ${video.uploadedBy} • ${video.views || 0} views
                      </div>
                    </div>
                    <button class="more-btn">⋮</button>
                  </div>
                </div>
              </div>`;
            container.innerHTML += cardHTML;
          });
        } else {
          noVideos.classList.remove('d-none');
        }
      } catch (error) {
        console.error('Error loading videos:', error);
        container.innerHTML = `
          <div class="col-12 text-center py-5">
            <p class="text-danger">Failed to load videos. Please try again later.</p>
          </div>`;
      }
    }

    // Placeholder for future video player
    function watchVideo(videoId) {
      alert(`Playing video: ${videoId} (Video player coming soon!)`);
      // Later you can redirect: window.location.href = `/watch?id=${videoId}`;
    }

    // Load videos when page loads
    window.onload = loadVideos;
  </script>
</body>
</html>
