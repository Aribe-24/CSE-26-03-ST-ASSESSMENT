<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Videx – Upload Video</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #fff; font-family: 'Roboto', Arial, sans-serif; }

    .play-icon {
      width: 36px; height: 36px;
      background: #FF0000;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .play-icon::after {
      content: '';
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 13px solid white;
      margin-left: 3px;
    }
    .logo-text { font-size: 24px; font-weight: 700; color: #FF0000; }

    .form-control, .form-select {
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 15px;
      color: #333;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control::placeholder { color: #aaa; }

    .form-control.is-invalid,
    .form-select.is-invalid {
      border-color: #FF0000 !important;
      box-shadow: 0 0 0 3px rgba(255,0,0,0.1) !important;
    }

    .form-control.is-valid,
    .form-select.is-valid {
      border-color: #28a745 !important;
      box-shadow: 0 0 0 3px rgba(40,167,69,0.1) !important;
    }

    .form-control:focus, .form-select:focus {
      border-color: #FF0000;
      box-shadow: 0 0 0 3px rgba(255,0,0,0.1);
      outline: none;
    }

    textarea.form-control { resize: none; height: 200px; }

    .invalid-msg {
      font-size: 12px;
      color: #FF0000;
      margin-top: 4px;
      display: none;
    }
    .show-error .invalid-msg { display: block; }

    .upload-video-box, .upload-thumb-box {
      border-radius: 10px;
      height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-video-box {
      background: #d9d9d9;
    }
    .upload-video-box:hover { background: #ccc; }
    .upload-video-box.is-invalid { border: 2px solid #FF0000; background: #fff0f0; }

    .upload-thumb-box {
      border: 2px dashed #ccc;
      background-size: cover;
      background-position: center;
    }
    .upload-thumb-box:hover { border-color: #FF0000; }
    .upload-thumb-box.is-invalid { border: 2px dashed #FF0000; background-color: #fff0f0; }

    .btn-upload {
      background: #FF0000;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 2px;
      border: 2px solid #FF0000;
      border-radius: 8px;
      padding: 16px;
      width: 100%;
      transition: all 0.2s;
    }
    .btn-upload:hover:not(:disabled) {
      background: #fff;
      color: #FF0000;
    }
    .btn-upload:disabled { opacity: 0.7; cursor: not-allowed; }

    input[type="file"] { display: none; }
    .field-wrap { display: flex; flex-direction: column; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar bg-white border-bottom sticky-top px-4 py-3">
    <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="videx-videos.html">
      <div class="play-icon"></div>
      <span class="logo-text">Videx</span>
    </a>
  </nav>

  <!-- FORM -->
  <div class="container py-5" style="max-width:1000px;">
    <h4 class="fw-bold mb-4" style="font-size:26px;">Upload your video</h4>

    <form id="uploadForm" novalidate>
      <div class="row g-4">

        <!-- LEFT -->
        <div class="col-12 col-md-6 d-flex flex-column gap-3">

          <div class="field-wrap">
            <input type="text" id="videoTitle" class="form-control" placeholder="Video Title"
                   oninput="validateField(this)" onblur="validateField(this)"/>
            <span class="invalid-msg">Video title is required.</span>
          </div>

          <div class="field-wrap">
            <textarea id="description" class="form-control" placeholder="Description (Optional)"
                      oninput="markOptional(this)"></textarea>
          </div>

          <div class="field-wrap">
            <select id="quality" class="form-select" onchange="validateField(this)" onblur="validateField(this)">
              <option value="" disabled selected hidden>Video quality</option>
              <option>360p</option>
              <option>480p</option>
              <option>720p HD</option>
              <option>1080p Full HD</option>
              <option>4K Ultra HD</option>
            </select>
            <span class="invalid-msg">Please select a video quality.</span>
          </div>

          <div class="field-wrap">
            <input type="date" id="pubDate" class="form-control" placeholder="Date of Publishing"
                   onchange="validateField(this)" onblur="validateField(this)" style="color:#aaa;"/>
            <span class="invalid-msg">Please select a publishing date.</span>
          </div>

        </div>

        <!-- RIGHT -->
        <div class="col-12 col-md-6 d-flex flex-column gap-3">

          <!-- Upload video -->
          <div class="field-wrap">
            <div class="upload-video-box" id="videoBox" onclick="document.getElementById('videoFile').click()">
              <input type="file" id="videoFile" accept="video/*" onchange="handleVideo(this)"/>
              <div class="icon">☁️</div>
              <span id="videoLabel">Upload video</span>
            </div>
            <span class="invalid-msg" id="videoErr">Please upload a video file.</span>
          </div>

          <!-- Upload thumbnail -->
          <div class="field-wrap">
            <div class="upload-thumb-box" id="thumbBox" onclick="document.getElementById('thumbFile').click()">
              <input type="file" id="thumbFile" accept="image/*" onchange="handleThumb(this)"/>
              <div class="icon" id="thumbIcon">☁️</div>
              <span id="thumbLabel">Upload Thumbnail</span>
            </div>
            <span class="invalid-msg" id="thumbErr">Please upload a thumbnail image.</span>
          </div>

          <!-- Submit -->
          <button type="submit" id="uploadBtn" class="btn-upload">UPLOAD</button>

        </div>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let videoUploaded = false;
    let thumbUploaded = false;

    function validateField(el) {
      const wrap = el.closest('.field-wrap');
      if (!el.value || el.value.trim() === '') {
        el.classList.remove('is-valid');
        wrap.classList.add('show-error');
        if (el.id === 'pubDate') el.style.color = '#aaa';
      } else {
        el.classList.remove('is-invalid');
        el.classList.add('is-valid');
        wrap.classList.remove('show-error');
        if (el.id === 'pubDate') el.style.color = '#333';
      }
    }

    function markOptional(el) {
      if (el.value.trim()) {
        el.classList.add('is-valid');
        el.classList.remove('is-invalid');
      } else {
        el.classList.remove('is-invalid');
      }
    }

    function handleVideo(input) {
      if (input.files && input.files[0]) {
        videoUploaded = true;
        document.getElementById('videoLabel').textContent = input.files[0].name;
        const box = document.getElementById('videoBox');
        const wrap = box.closest('.field-wrap');
        box.classList.remove('is-invalid');
        wrap.classList.remove('show-error');
        document.getElementById('videoErr').style.display = 'none';
      }
    }

    function handleThumb(input) {
      if (input.files && input.files[0]) {
        thumbUploaded = true;
        const box = document.getElementById('thumbBox');
        const wrap = box.closest('.field-wrap');
        const reader = new FileReader();
        reader.onload = e => {
          box.style.backgroundImage = `url(${e.target.result})`;
          document.getElementById('thumbIcon').style.display = 'none';
          document.getElementById('thumbLabel').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);

        box.classList.remove('is-invalid');
        wrap.classList.remove('show-error');
        document.getElementById('thumbErr').style.display = 'none';
      }
    }

    // Real Upload Handler
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      let valid = true;

      // Validate required fields
      ['videoTitle', 'quality', 'pubDate'].forEach(id => {
        const el = document.getElementById(id);
        validateField(el);
        if (!el.value || el.value.trim() === '') valid = false;
      });

      // Validate files
      if (!videoUploaded) {
        const box = document.getElementById('videoBox');
        const wrap = box.closest('.field-wrap');
        box.classList.add('is-invalid');
        wrap.classList.add('show-error');
        document.getElementById('videoErr').style.display = 'block';
        valid = false;
      }

      if (!thumbUploaded) {
        const box = document.getElementById('thumbBox');
        const wrap = box.closest('.field-wrap');
        box.classList.add('is-invalid');
        wrap.classList.add('show-error');
        document.getElementById('thumbErr').style.display = 'block';
        valid = false;
      }

      if (!valid) return;

      // Prepare FormData
      const formData = new FormData();
      formData.append('title', document.getElementById('videoTitle').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('quality', document.getElementById('quality').value);
      formData.append('publishDate', document.getElementById('pubDate').value);
      formData.append('videoFile', document.getElementById('videoFile').files[0]);
      formData.append('thumbnailFile', document.getElementById('thumbFile').files[0]);

      // UI Feedback
      const btn = document.getElementById('uploadBtn');
      const originalText = btn.textContent;
      btn.textContent = 'UPLOADING...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/videos', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          btn.textContent = '✔ UPLOADED SUCCESSFULLY!';
          btn.style.background = '#28a745';
          btn.style.borderColor = '#28a745';

          setTimeout(() => {
            window.location.href = '/videos';
          }, 1500);
        } else {
          alert(result.error || 'Upload failed. Please try again.');
          resetButton();
        }
      } catch (err) {
        console.error(err);
        alert('Network error. Please check your connection and try again.');
        resetButton();
      }

      function resetButton() {
        btn.textContent = originalText;
        btn.disabled = false;
        btn.style.background = '';
        btn.style.borderColor = '';
      }
    });
  </script>
</body>
</html>
