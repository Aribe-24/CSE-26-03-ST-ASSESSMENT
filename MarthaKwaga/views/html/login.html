 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videx Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Roboto',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8f9fa;
      padding:20px;
    }

    .login-container{
      width:100%;
      max-width:420px;
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    /* Logo */
    .logo{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:25px;
    }

    .play-icon{
      width:50px;
      height:50px;
      background:#FF0000;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .play-icon::after{
      content:'';
      width:0;
      height:0;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
      border-left:16px solid white;
      margin-left:3px;
    }

    .logo-text{
      color:#FF0000;
      font-size:38px;
      font-weight:700;
    }

    .heading{
      text-align:center;
      margin-bottom:30px;
    }

    .heading h2{
      color:#333;
      margin-bottom:8px;
    }

    .heading p{
      color:#777;
      font-size:14px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:6px;
      font-weight:500;
      color:#333;
    }

    .form-control{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:15px;
    }

    .form-control:focus{
      outline:none;
      border-color:#FF0000;
    }

    .login-btn{
      width:100%;
      padding:14px;
      background:#FF0000;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#d90000;
    }

    .links{
      margin-top:20px;
      text-align:center;
      color:#666;
      font-size:14px;
    }

    .links a{
      color:#FF0000;
      text-decoration:none;
      font-weight:500;
    }

    .links a:hover{
      text-decoration:underline;
    }

    .forgot-password{
      display:block;
      text-align:right;
      margin-bottom:20px;
      color:#FF0000;
      text-decoration:none;
      font-size:14px;
    }

    .forgot-password:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="logo">
      <div class="play-icon"></div>
      <span class="logo-text">Videx</span>
    </div>

    <div class="heading">
      <h2>Welcome Back</h2>
      <p>Sign in to upload and manage your videos</p>
    </div>

    <form action="/login" method="POST">

      <div class="form-group">
        <label>Email or Username</label>
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Enter your email or username"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Enter your password"
          required>
      </div>

      <a href="/forgot-password" class="forgot-password">
        Forgot Password?
      </a>

      <button type="submit" class="login-btn">
        LOGIN
      </button>

    </form>

    <div class="links">
      Don't have an account?
      <a href="/signup.html">Create Account</a>
    </div>

  </div>

</body>
</html>
