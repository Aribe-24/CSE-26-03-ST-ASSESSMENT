<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Videx</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Roboto',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8f9fa;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .logo{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:25px;
    }

    .play-icon{
      width:50px;
      height:50px;
      background:#FF0000;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .play-icon::after{
      content:'';
      width:0;
      height:0;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
      border-left:16px solid white;
      margin-left:3px;
    }

    .logo-text{
      color:#FF0000;
      font-size:38px;
      font-weight:700;
    }

    h2{
      text-align:center;
      color:#333;
      margin-bottom:10px;
    }

    .description{
      text-align:center;
      color:#777;
      font-size:14px;
      margin-bottom:30px;
      line-height:1.5;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:500;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:15px;
    }

    input:focus{
      outline:none;
      border-color:#FF0000;
    }

    .btn{
      width:100%;
      padding:14px;
      background:#FF0000;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
    }

    .btn:hover{
      background:#d90000;
    }

    .back-link{
      text-align:center;
      margin-top:20px;
    }

    .back-link a{
      color:#FF0000;
      text-decoration:none;
      font-weight:500;
    }

    .back-link a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <div class="play-icon"></div>
      <span class="logo-text">Videx</span>
    </div>

    <h2>Forgot Password?</h2>

    <p class="description">
      Enter the email address associated with your account reset your password.
    </p>

    <form action="/forgot-password" method="POST">

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required>
      </div>

      <button type="submit" class="btn">
        RESET PASSWORD
      </button>

    </form>

    <div class="back-link">
      <a href="/login.html">← Back to Login</a>
    </div>

  </div>

</body>
</html>
