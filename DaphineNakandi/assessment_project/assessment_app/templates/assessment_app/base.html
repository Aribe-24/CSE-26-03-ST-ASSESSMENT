<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Videx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f9f9f9; }
        .navbar-brand { color: red; font-weight: bold; }
        .btn-danger, .btn-outline-danger { font-weight: bold; }
        .content-container { max-width: 1200px; margin: auto; padding: 20px; }

        /* General page background */
body {
    background-color: #f9f9f9;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* Navbar branding */
.navbar-brand {
    color: red;
    font-weight: bold;
    font-size: 22px;
}

/* Form container */
form {
    background: #fff;
    border-radius: 8px;
}

/* Labels */
.form-label {
    font-weight: 600;
    color: #333;
}

/* Inputs */
.form-control, .form-select {
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 10px;
}

/* Error borders */
.is-invalid {
    border-color: #dc3545;
    box-shadow: 0 0 5px rgba(220, 53, 69, 0.5);
}

/* Error text */
.invalid-feedback {
    font-size: 0.9rem;
    color: #dc3545;
}

/* Upload button */
.btn-danger {
    font-weight: bold;
    padding: 10px 30px;
    border-radius: 6px;
    font-size: 1.1rem;
}

/* Content container */
.container {
    max-width: 900px;
}

    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light px-3">
        <a class="navbar-brand" href="{% url 'landing' %}">
            <span style="color:red; font-size:24px;">▶</span> Videx
        </a>
        <div>
            <a href="{% url 'upload_video' %}" class="btn btn-outline-danger">Add Video</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content-container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
