<!-- templates/home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        a {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #0056b3;
        }

        .video-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .video-item {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 350px;
            transition: transform 0.2s;
        }

        .video-item:hover {
            transform: scale(1.02);
        }

        .video-item h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #555;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .video-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Video Gallery</h1>
    <div style="text-align: center;">
        <a href="{% url 'add_video' %}">Add New Video</a>
    </div>
    <div class="video-list">
        {% if videos %}
            {% for video in videos %}
                <div class="video-item">
                    <h2>{{ video.title }}</h2>
                    {% if video.video_file %}
                        <video controls>
                            <source src="{{ video.video_file.url }}" type="video/mp4" />
                            Your browser does not support the video tag.
                        </video>
                    {% else %}
                        <p>No video file available.</p>
                    {% endif %}
                </div>
            {% endfor %}
        {% else %}
            <p style="text-align: center;">No videos found.</p>
        {% endif %}
    </div>
</body>
</html>
