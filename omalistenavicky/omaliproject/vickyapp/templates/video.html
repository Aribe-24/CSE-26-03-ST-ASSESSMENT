{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-100 p-6">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-8">
    <a href="{% url 'video_page' %}" class="flex items-center gap-3">
      <div class="bg-red-600 rounded-full w-9 h-9 flex items-center justify-center">
        <i data-lucide="play" class="text-white w-5 h-5 ml-0.5"></i>
      </div>
      <span class="text-2xl font-bold text-red-600">Videx</span>
    </a>
    <span class="text-gray-400 flex items-center gap-1">
      <i data-lucide="chevron-right" class="w-4 h-4"></i>
      Add Video
    </span>
  </div>
{% endblock%}
  <form method="post" enctype="multipart/form-data" id="uploadForm" novalidate>
    {% csrf_token %}

    <div class="flex flex-col lg:flex-row gap-6">

      <!-- ===== LEFT COLUMN ===== -->
      <div class="flex-1 flex flex-col gap-4">

        <!-- Video Title -->
        <div>
          <input
            type="text"
            name="title"
            id="id_title"
            placeholder="Video Title"
            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-4 text-gray-700
                   placeholder-gray-400 focus:outline-none focus:border-red-400 transition text-sm"
          />
          <p class="text-red-500 text-xs mt-1 hidden items-center gap-1" id="err_title">
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Title is required.
          </p>
        </div>

        <!-- Description -->
        <div>
          <textarea
            name="description"
            id="id_description"
            placeholder="Description (Optional)"
            rows="4"
            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-4 text-gray-700
                   placeholder-gray-400 focus:outline-none focus:border-red-400 transition text-sm resize-none"
          ></textarea>
        </div>

        <!-- Video Quality -->
        <div>
          <select
            name="quality"
            id="id_quality"
            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-4 text-gray-400
                   focus:outline-none focus:border-red-400 transition text-sm appearance-none
                   bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22%3E%3Cpath d=%22m6 9 6 6 6-6%22/%3E%3C/svg%3E')]
                   bg-no-repeat bg-[right_1rem_center]"
          >
            <option value="">Video Quality</option>
            <option value="360p">360p</option>
            <option value="720p">720p</option>
            <option value="1080p">1080p</option>
          </select>
          <p class="text-red-500 text-xs mt-1 hidden items-center gap-1" id="err_quality">
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Please select a quality.
          </p>
        </div>

        <!-- Video Privacy -->
        <div>
          <select
            name="privacy"
            id="id_privacy"
            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-4 text-gray-400
                   focus:outline-none focus:border-red-400 transition text-sm appearance-none
                   bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22%3E%3Cpath d=%22m6 9 6 6 6-6%22/%3E%3C/svg%3E')]
                   bg-no-repeat bg-[right_1rem_center]"
          >
            <option value="">Video Privacy</option>
            <option value="public">Public</option>
            <option value="private">Private</option>
          </select>
          <p class="text-red-500 text-xs mt-1 hidden items-center gap-1" id="err_privacy">
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Please select privacy.
          </p>
        </div>

        <!-- Publishing (date picker) -->
        <div class="relative">
          <input
            type="date"
            name="publish_date"
            id="id_publish_date"
            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-4 text-gray-400
                   focus:outline-none focus:border-red-400 transition text-sm"
            placeholder="Publishing"
          />
          <!-- Calendar icon overlay -->
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
            <i data-lucide="calendar" class="w-5 h-5 text-gray-400"></i>
          </div>
        </div>

      </div>

      <!-- ===== RIGHT COLUMN ===== -->
      <div class="flex-1 flex flex-col gap-4">

        <!-- Upload Video Area -->
        <div>
          <div
            id="video_drop_area"
            onclick="document.getElementById('id_video_file').click()"
            class="w-full bg-white border border-gray-200 rounded-xl flex flex-col items-center
                   justify-center h-56 cursor-pointer hover:border-red-400 hover:bg-red-50
                   transition-all duration-200"
          >
            <video id="video_preview" class="hidden w-full h-full rounded-xl object-cover" controls></video>
            <div id="video_placeholder" class="flex flex-col items-center gap-3">
              <i data-lucide="cloud-upload" class="w-16 h-16 text-gray-300"></i>
              <p class="text-gray-400 text-sm font-medium">Upload video</p>
            </div>
          </div>
          <input type="file" name="video_file" id="id_video_file" accept="video/*" class="hidden"/>
          <p class="text-red-500 text-xs mt-1 hidden items-center gap-1" id="err_video">
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Please upload a video.
          </p>
        </div>

        <!-- Upload Thumbnail Area -->
        <div>
          <div
            id="thumb_drop_area"
            onclick="document.getElementById('id_thumbnail').click()"
            class="w-full bg-white border border-gray-200 rounded-xl flex flex-col items-center
                   justify-center h-56 cursor-pointer hover:border-red-400 hover:bg-red-50
                   transition-all duration-200"
          >
            <img id="thumb_preview" class="hidden w-full h-full rounded-xl object-cover" alt="Thumbnail"/>
            <div id="thumb_placeholder" class="flex flex-col items-center gap-3">
              <i data-lucide="cloud-upload" class="w-16 h-16 text-gray-300"></i>
              <p class="text-gray-400 text-sm font-medium">Upload Thumbnail</p>
            </div>
          </div>
          <input type="file" name="thumbnail" id="id_thumbnail" accept="image/*" class="hidden"/>
          <p class="text-red-500 text-xs mt-1 hidden items-center gap-1" id="err_thumb">
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Please upload a thumbnail.
