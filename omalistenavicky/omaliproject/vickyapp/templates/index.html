<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videx</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.logo{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:50px;
}

.icon{
    width:80px;
    height:80px;
    background:red;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.icon i{
    color:white;
    font-size:30px;
}

.logo h1{
    color:red;
    font-size:80px;
    font-weight:500;
}

.join-btn{
    width:240px;
    height:60px;
    border:2px solid red;
    background:transparent;
    color:red;
    font-size:28px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.join-btn:hover{
    background:red;
    color:white;
}
</style>

    <div class="container">

        <div class="logo">
            <div class="icon">
                <i class="fa-solid fa-play"></i>
            </div>
            <h1>Videx</h1>
        </div>
<button class="join-btn" onclick="window.location.href='{% url 'home' %}'">JOIN</button>
    </div>

</body>
</html>
