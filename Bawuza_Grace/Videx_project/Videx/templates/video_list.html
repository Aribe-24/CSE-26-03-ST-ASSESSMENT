{% load static %}
<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.logo{
    color:#e50914;
    font-weight:bold;
}

.video-card{
    border:none;
    background:white;
}

.video-thumb{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.add-btn{
    border:2px solid #e50914;
    color:#e50914;
}

.add-btn:hover{
    background:#e50914;
    color:white;
}

.video-thumb{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center">

    <img
    src="{% static 'images/videx.png' %}"
    width="180"
    alt="Videx Logo"
>

    <a href="{% url 'upload_video' %}"
       class="btn add-btn">
       Add Video
    </a>

</div>

<hr>

<h2 class="mb-4">Videos</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="row">

{% for video in videos %}

<div class="col-md-3 mb-4">

    <div class="video-card">

        <video
    class="video-thumb"
    controls
    poster="{{ video.thumbnail.url }}"
>
    <source src="{{ video.video_file.url }}">
</video>

        <div class="mt-2">

            <h6>{{ video.title }}</h6>

            <small class="text-muted">
                {{ video.publish_date }}
            </small>

        </div>

    </div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
