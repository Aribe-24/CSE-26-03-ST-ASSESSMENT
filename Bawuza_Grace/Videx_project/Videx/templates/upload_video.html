<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.upload-container{
    background:white;
    padding:40px;
    border-radius:12px;
}

.form-control,
.form-select{
    margin-bottom:20px;
    border:1px solid #d9d9d9;
    border-radius:8px;
    padding:12px;
}

textarea{
    height:220px;
    resize:none;
}

.upload-area{
    border:2px dashed #d9d9d9;
    border-radius:10px;
    min-height:180px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:#fafafa;
}

.upload-area input{
    margin-top:10px;
}

.upload-btn{
    background:#e50914;
    color:white;
    font-weight:bold;
    padding:12px;
    border:2px solid #e50914;
    transition:0.3s;
    width: 500px;
}

.upload-btn:hover{
    background:white;
    color:#e50914;
    border:2px solid #e50914;
}

.upload-card{
    min-height:250px;
    border:2px dashed #ddd;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* .form-control.error,
.form-select.error{
    border:2px solid red;
} */

/* input:invalid,
select:invalid{
    border:2px solid red;
} */
</style>

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4 fw-bold">
        Upload your video
    </h2>

    <a href="{% url 'video_list' %}"
       class="btn btn-outline-secondary mb-4">
       ← Back to Videos
    </a>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <div class="row">

            <!-- LEFT SIDE -->

            <div class="container py-5">

    <div class="upload-container">

        <h2 class="mb-4 fw-bold">
            Upload your video
        </h2>

        <div class="row">

            <div class="col-lg-7">

                {{ form.title }}
          

                {{ form.description }}

                {{ form.quality }}
       

                {{ form.publish_date }}
             
   
            </div>

            <div class="col-lg-5">

                <div class="upload-area">
                    <h6>Upload Video</h6>
                    {{ form.video_file }}

                    <video
        id="videoPreview"
        width="100%"
        controls
        style="display:none; margin-top:10px;">
    </video>
              
   
                </div>

                <div class="upload-area mt-4">
                    <h6>Upload Thumbnail</h6>
                    {{ form.thumbnail }}
                    <img
        id="thumbnailPreview"
        width="100%"
        style="display:none; margin-top:10px;">

             
                </div>

                <button class="btn upload-btn mt-4">
                    UPLOAD
                </button>

            </div>

        </div>

    </div>

</div>

            </div>

        </div>

    </form>

</div>
<script>

document.getElementById('id_video_file')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const url = URL.createObjectURL(file);

        const preview =
            document.getElementById('videoPreview');

        preview.src = url;
        preview.style.display = 'block';
    }

});

document.getElementById('id_thumbnail')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const url = URL.createObjectURL(file);

        const preview =
            document.getElementById('thumbnailPreview');

        preview.src = url;
        preview.style.display = 'block';
    }

});

</script>
</body>
</html>
