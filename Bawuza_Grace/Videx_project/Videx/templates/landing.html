{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Videx</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .logo{
            width:300px;
        }

        .join-btn{
            width:180px;
            border:2px solid #e50914;
            color:#e50914;
            font-weight:bold;
        }

        .join-btn:hover{
            background:#e50914;
            color:white;
        }
    </style>
</head>

<body>

<div class="text-center">

    <img
        src="{% static 'images/videx.png' %}"
        class="logo"
        alt="Videx Logo"
    >

    <br><br>

    <a href="{% url 'video_list' %}"
       class="btn join-btn">
        JOIN
    </a>

</div>

</body>
</html>
